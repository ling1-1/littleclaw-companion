<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- mecha-servo: 伺服伴机 | servo stage | segmented wings, scan-line eyes, status bar, jointed legs -->
  <!-- animation anchors: #body (tilt), #eyes (scan), #wings (extend), #lights (blink), #status-bar (update) -->
  <g id="wings">
    <rect x="18" y="210" width="104" height="150" rx="32" fill="#7E9FB4" stroke="#4A7090" stroke-width="8"/>
    <rect x="390" y="210" width="104" height="150" rx="32" fill="#7E9FB4" stroke="#4A7090" stroke-width="8"/>
    <line x1="18" y1="264" x2="122" y2="264" stroke="#4A7090" stroke-width="5"/>
    <line x1="18" y1="296" x2="122" y2="296" stroke="#4A7090" stroke-width="5"/>
    <line x1="390" y1="264" x2="494" y2="264" stroke="#4A7090" stroke-width="5"/>
    <line x1="390" y1="296" x2="494" y2="296" stroke="#4A7090" stroke-width="5"/>
    <circle cx="68" cy="228" r="13" fill="#7CE0FF" stroke="#3AA8D8" stroke-width="4"/>
    <circle cx="444" cy="228" r="13" fill="#7CE0FF" stroke="#3AA8D8" stroke-width="4"/>
    <circle cx="68" cy="228" r="20" fill="#7CE0FF" opacity=".2"/>
    <circle cx="444" cy="228" r="20" fill="#7CE0FF" opacity=".2"/>
  </g>
  <g id="legs">
    <rect x="160" y="432" width="56" height="56" rx="22" fill="#7E9FB4" stroke="#4A7090" stroke-width="7"/>
    <rect x="296" y="432" width="56" height="56" rx="22" fill="#7E9FB4" stroke="#4A7090" stroke-width="7"/>
    <rect x="140" y="470" width="96" height="44" rx="20" fill="#5A8098" stroke="#4A7090" stroke-width="6"/>
    <rect x="276" y="470" width="96" height="44" rx="20" fill="#5A8098" stroke="#4A7090" stroke-width="6"/>
    <circle cx="188" cy="436" r="19" fill="#DDEAF3" stroke="#4A7090" stroke-width="5"/>
    <circle cx="324" cy="436" r="19" fill="#DDEAF3" stroke="#4A7090" stroke-width="5"/>
  </g>
  <g id="body">
    <rect x="94" y="148" width="324" height="292" rx="72" fill="#7E9FB4" stroke="#4A7090" stroke-width="9"/>
  </g>
  <g id="chest-panel">
    <rect x="118" y="172" width="276" height="244" rx="52" fill="#DDEAF3" stroke="#5A8098" stroke-width="6"/>
    <circle cx="128" cy="184" r="9" fill="#5A8098"/>
    <circle cx="384" cy="184" r="9" fill="#5A8098"/>
    <circle cx="128" cy="408" r="9" fill="#5A8098"/>
    <circle cx="384" cy="408" r="9" fill="#5A8098"/>
  </g>
  <g id="status-bar">
    <rect x="154" y="198" width="204" height="28" rx="14" fill="#5A8098" stroke="#4A7090" stroke-width="4"/>
    <rect x="160" y="204" width="80" height="16" rx="8" fill="#7CE0FF"/>
    <rect x="248" y="204" width="48" height="16" rx="8" fill="#7CE0FF" opacity=".55"/>
  </g>
  <g id="eyes">
    <rect x="154" y="254" width="90" height="72" rx="22" fill="#7E9FB4" stroke="#4A7090" stroke-width="7"/>
    <rect x="268" y="254" width="90" height="72" rx="22" fill="#7E9FB4" stroke="#4A7090" stroke-width="7"/>
    <rect x="162" y="274" width="72" height="14" rx="7" fill="#7CE0FF"/>
    <rect x="276" y="274" width="72" height="14" rx="7" fill="#7CE0FF"/>
    <rect x="162" y="294" width="52" height="9" rx="4" fill="#7CE0FF" opacity=".5"/>
    <rect x="276" y="294" width="52" height="9" rx="4" fill="#7CE0FF" opacity=".5"/>
    <rect x="154" y="254" width="90" height="72" rx="22" fill="none" stroke="#7CE0FF" stroke-width="4" opacity=".4"/>
    <rect x="268" y="254" width="90" height="72" rx="22" fill="none" stroke="#7CE0FF" stroke-width="4" opacity=".4"/>
  </g>
  <g id="mouth">
    <rect x="174" y="354" width="164" height="36" rx="18" fill="#5A8098" stroke="#4A7090" stroke-width="4"/>
    <path d="M186 372 Q256 352 326 372" stroke="#7CE0FF" stroke-width="6" fill="none" stroke-linecap="round"/>
  </g>
</svg>
