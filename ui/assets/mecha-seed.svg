<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- mecha-seed: 火花机核 | seed stage | round body, stubby ear-wings, indicator lights, screen dot-eyes -->
  <!-- animation anchors: #body (tilt), #eyes (blink/scan), #lights (blink), #ear-wings (twitch), #spark (flicker) -->
  <g id="ear-wings">
    <rect x="30" y="196" width="86" height="114" rx="28" fill="#8AA7B8" stroke="#5A7888" stroke-width="7"/>
    <rect x="396" y="196" width="86" height="114" rx="28" fill="#8AA7B8" stroke="#5A7888" stroke-width="7"/>
    <rect x="44" y="218" width="30" height="38" rx="14" fill="#EAF4FA" opacity=".7"/>
    <rect x="438" y="218" width="30" height="38" rx="14" fill="#EAF4FA" opacity=".7"/>
    <circle cx="60" cy="244" r="8" fill="#6ED3FF" opacity=".6"/>
    <circle cx="452" cy="244" r="8" fill="#6ED3FF" opacity=".6"/>
  </g>
  <g id="legs">
    <rect x="154" y="428" width="50" height="70" rx="22" fill="#8AA7B8" stroke="#5A7888" stroke-width="6"/>
    <rect x="308" y="428" width="50" height="70" rx="22" fill="#8AA7B8" stroke="#5A7888" stroke-width="6"/>
    <rect x="140" y="480" width="78" height="38" rx="18" fill="#6A8898" stroke="#5A7888" stroke-width="5"/>
    <rect x="294" y="480" width="78" height="38" rx="18" fill="#6A8898" stroke="#5A7888" stroke-width="5"/>
  </g>
  <g id="body">
    <rect x="88" y="140" width="336" height="300" rx="90" fill="#8AA7B8" stroke="#5A7888" stroke-width="9"/>
  </g>
  <g id="face-panel">
    <rect x="108" y="160" width="296" height="272" rx="72" fill="#EAF4FA" stroke="#6A8898" stroke-width="6"/>
    <circle cx="126" cy="178" r="9" fill="#6A8898"/>
    <circle cx="386" cy="178" r="9" fill="#6A8898"/>
    <circle cx="126" cy="414" r="9" fill="#6A8898"/>
    <circle cx="386" cy="414" r="9" fill="#6A8898"/>
  </g>
  <g id="lights">
    <circle cx="178" cy="212" r="16" fill="#6ED3FF" stroke="#3AABE8" stroke-width="4"/>
    <circle cx="256" cy="212" r="16" fill="#6ED3FF" stroke="#3AABE8" stroke-width="4" opacity=".6"/>
    <circle cx="334" cy="212" r="16" fill="#6ED3FF" stroke="#3AABE8" stroke-width="4" opacity=".35"/>
    <circle cx="178" cy="212" r="26" fill="#6ED3FF" opacity=".18"/>
  </g>
  <g id="eyes">
    <rect x="148" y="248" width="84" height="80" rx="22" fill="#8AA7B8" stroke="#5A7888" stroke-width="6"/>
    <rect x="280" y="248" width="84" height="80" rx="22" fill="#8AA7B8" stroke="#5A7888" stroke-width="6"/>
    <circle cx="190" cy="288" r="26" fill="#6ED3FF" opacity=".9"/>
    <circle cx="322" cy="288" r="26" fill="#6ED3FF" opacity=".9"/>
    <circle cx="190" cy="288" r="14" fill="white"/>
    <circle cx="322" cy="288" r="14" fill="white"/>
    <circle cx="190" cy="288" r="14" fill="none" stroke="#6ED3FF" stroke-width="4" opacity=".8"/>
    <circle cx="322" cy="288" r="14" fill="none" stroke="#6ED3FF" stroke-width="4" opacity=".8"/>
  </g>
  <g id="mouth">
    <rect x="168" y="358" width="176" height="28" rx="14" fill="#8AA7B8" stroke="#5A7888" stroke-width="4"/>
    <rect x="176" y="362" width="32" height="18" rx="6" fill="#6A8898"/>
    <rect x="224" y="362" width="26" height="18" rx="6" fill="#6A8898" opacity=".6"/>
    <rect x="266" y="362" width="26" height="18" rx="6" fill="#6A8898" opacity=".35"/>
  </g>
  <g id="spark">
    <path d="M402 148 L422 126 L414 154 L438 134" stroke="#6ED3FF" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="438" cy="134" r="5" fill="#6ED3FF" opacity=".8"/>
  </g>
</svg>
